<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>

    <!-- Accent gradients -->
    <linearGradient id="reactGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#61dafb"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="swiftGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f05138"/>
      <stop offset="100%" stop-color="#ff6f56"/>
    </linearGradient>
    <linearGradient id="androidGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3ddc84"/>
      <stop offset="100%" stop-color="#2ec27e"/>
    </linearGradient>
    <linearGradient id="codeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="glowLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#61dafb" stop-opacity="0"/>
      <stop offset="20%" stop-color="#61dafb" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#f05138" stop-opacity="0.6"/>
      <stop offset="80%" stop-color="#3ddc84" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#3ddc84" stop-opacity="0"/>
    </linearGradient>

    <!-- Subtle dot pattern -->
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="0.8" fill="#ffffff" opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" rx="16" fill="url(#bg)"/>
  <rect width="1200" height="400" rx="16" fill="url(#dots)"/>

  <!-- Decorative glow line at top -->
  <rect x="100" y="0" width="1000" height="2" fill="url(#glowLine)" rx="1"/>

  <!-- Geometric accents (subtle background shapes) -->
  <circle cx="150" cy="80" r="120" fill="#61dafb" opacity="0.03"/>
  <circle cx="1050" cy="320" r="150" fill="#f05138" opacity="0.03"/>
  <circle cx="600" cy="400" r="200" fill="#3ddc84" opacity="0.02"/>

  <!-- === LEFT SECTION: Platform Icons === -->

  <!-- React Atom (left) -->
  <g transform="translate(120, 160)">
    <!-- Nucleus -->
    <circle cx="0" cy="0" r="6" fill="#61dafb"/>
    <!-- Orbits -->
    <ellipse cx="0" cy="0" rx="38" ry="14" fill="none" stroke="#61dafb" stroke-width="1.5" opacity="0.8"/>
    <ellipse cx="0" cy="0" rx="38" ry="14" fill="none" stroke="#61dafb" stroke-width="1.5" opacity="0.8" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="38" ry="14" fill="none" stroke="#61dafb" stroke-width="1.5" opacity="0.8" transform="rotate(-60)"/>
  </g>
  <text x="120" y="220" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#61dafb" font-weight="600" letter-spacing="0.5">REACT NATIVE</text>

  <!-- Swift Logo (from official icon) -->
  <g transform="translate(218, 128) scale(0.000192)">
    <defs>
      <linearGradient id="swBg" gradientUnits="userSpaceOnUse" x1="196383" y1="-1115.35" x2="137302" y2="333952">
        <stop offset="0" stop-color="#f9b13d"/>
        <stop offset="1" stop-color="#e63830"/>
      </linearGradient>
      <linearGradient id="swOv" gradientUnits="userSpaceOnUse" x1="173948" y1="-2539.76" x2="125024" y2="274914">
        <stop offset="0" stop-color="#e5a235"/>
        <stop offset="1" stop-color="#d23629"/>
      </linearGradient>
    </defs>
    <g fill-rule="nonzero">
      <path d="M73350 243h186101c41094-298 73883 32298 73883 73585v185770c0 40626-32789 73763-73883 73415H73350c-39718 0-72999-32789-72999-73415V73828C351 32541 33632-523 73350 243z" fill="url(#swBg)"/>
      <path d="M281382 272374s-12972-21008-34183-21008c-21660 0-32351 21008-75206 21008-92987 0-137068-76506-138071-78316 0 519 519 519 519 519L0 158396V73558C0 32462 33572 1 73099 1h66538l48550 49735c52 0 52-519 532-1015 110252 76190 74705 158613 74705 158613s30525 34574 17958 65042z" fill="url(#swOv)"/>
      <path d="M189263 49490c109868 74795 74378 157625 74378 157625s30534 34878 18035 65459c0 0-12991-21231-34161-21231-21219 0-33928 21231-75302 21231-94193 0-137215-78533-137215-78533 83546 56856 141921 16544 141921 16544C138636 188424 57167 83892 57167 83892c70392 59101 100324 74754 100324 74754-17690-14066-68076-87098-68076-87098 41046 40763 121543 98528 121543 98528 22163-64076-21694-120586-21694-120586z" fill="#fefefe"/>
    </g>
  </g>
  <text x="250" y="220" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#f05138" font-weight="600" letter-spacing="0.5">SWIFTUI</text>

  <!-- Android Robot (left area) -->
  <g transform="translate(370, 138)">
    <!-- Head -->
    <path d="M-16,-20 L-16,-8 A16,16 0 0,1 16,-8 L16,-20 Z" fill="none"/>
    <rect x="-16" y="-8" width="32" height="24" rx="4" fill="#3ddc84" opacity="0.9"/>
    <path d="M-16,-8 A16,16 0 0,1 16,-8" fill="#3ddc84" opacity="0.9"/>
    <!-- Eyes -->
    <circle cx="-7" cy="-2" r="2.5" fill="#0f172a"/>
    <circle cx="7" cy="-2" r="2.5" fill="#0f172a"/>
    <!-- Antennae -->
    <line x1="-9" y1="-22" x2="-5" y2="-12" stroke="#3ddc84" stroke-width="2" stroke-linecap="round"/>
    <line x1="9" y1="-22" x2="5" y2="-12" stroke="#3ddc84" stroke-width="2" stroke-linecap="round"/>
    <!-- Body -->
    <rect x="-16" y="18" width="32" height="28" rx="4" fill="#3ddc84" opacity="0.9"/>
    <!-- Arms -->
    <rect x="-24" y="18" width="6" height="20" rx="3" fill="#3ddc84" opacity="0.9"/>
    <rect x="18" y="18" width="6" height="20" rx="3" fill="#3ddc84" opacity="0.9"/>
    <!-- Legs -->
    <rect x="-12" y="48" width="6" height="14" rx="3" fill="#3ddc84" opacity="0.9"/>
    <rect x="6" y="48" width="6" height="14" rx="3" fill="#3ddc84" opacity="0.9"/>
  </g>
  <text x="370" y="220" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#3ddc84" font-weight="600" letter-spacing="0.5">ANDROID</text>

  <!-- === CENTER: Title === -->
  <text x="600" y="130" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="44" fill="#ffffff" font-weight="700" letter-spacing="-0.5">
    React Native
  </text>
  <text x="600" y="178" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="44" fill="url(#reactGrad)" font-weight="700" letter-spacing="-0.5">
    SwiftUI DSL
  </text>

  <!-- Subtitle -->
  <text x="600" y="212" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" fill="#94a3b8" font-weight="400" letter-spacing="3">
    DECLARATIVE UI BUILDER
  </text>

  <!-- Divider line -->
  <line x1="480" y1="230" x2="720" y2="230" stroke="#334155" stroke-width="1"/>

  <!-- === BOTTOM: Code snippet === -->
  <g transform="translate(380, 250)">
    <!-- Code block background -->
    <rect x="0" y="0" width="440" height="120" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>

    <!-- Window dots -->
    <circle cx="18" cy="14" r="4" fill="#f05138" opacity="0.8"/>
    <circle cx="32" cy="14" r="4" fill="#eab308" opacity="0.8"/>
    <circle cx="46" cy="14" r="4" fill="#3ddc84" opacity="0.8"/>

    <!-- Code lines (using tspan for proper character spacing) -->
    <text xml:space="preserve" x="18" y="44" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="12"><tspan fill="#c084fc">VStack</tspan><tspan fill="#94a3b8">(</tspan></text>
    <text xml:space="preserve" x="18" y="60" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="12"><tspan fill="#94a3b8">  </tspan><tspan fill="#c084fc">Text</tspan><tspan fill="#94a3b8">(</tspan><tspan fill="#86efac">'Hello World'</tspan><tspan fill="#94a3b8">).</tspan><tspan fill="#61dafb">font</tspan><tspan fill="#94a3b8">(</tspan><tspan fill="#86efac">'title'</tspan><tspan fill="#94a3b8">).</tspan><tspan fill="#61dafb">bold</tspan><tspan fill="#94a3b8">(),</tspan></text>
    <text xml:space="preserve" x="18" y="76" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="12"><tspan fill="#94a3b8">  </tspan><tspan fill="#c084fc">Button</tspan><tspan fill="#94a3b8">(</tspan><tspan fill="#86efac">'Get Started'</tspan><tspan fill="#94a3b8">).</tspan><tspan fill="#61dafb">filled</tspan><tspan fill="#94a3b8">(),</tspan></text>
    <text xml:space="preserve" x="18" y="92" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', monospace" font-size="12"><tspan fill="#94a3b8">).</tspan><tspan fill="#61dafb">padding</tspan><tspan fill="#94a3b8">(</tspan><tspan fill="#86efac">'lg'</tspan><tspan fill="#94a3b8">).</tspan><tspan fill="#61dafb">background</tspan><tspan fill="#94a3b8">(</tspan><tspan fill="#86efac">'card'</tspan><tspan fill="#94a3b8">).</tspan><tspan fill="#61dafb">shadow</tspan><tspan fill="#94a3b8">()</tspan></text>

    <!-- Cursor blink -->
    <rect x="328" y="82" width="2" height="14" fill="#61dafb" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0;0.7" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Feature badges at very bottom -->
  <g transform="translate(600, 390)">
    <text x="-280" y="0" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#64748b" letter-spacing="0.5">Chainable Modifiers</text>
    <text x="-140" y="0" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#475569">•</text>
    <text x="-30" y="0" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#64748b" letter-spacing="0.5">Theme System</text>
    <text x="70" y="0" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#475569">•</text>
    <text x="170" y="0" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#64748b" letter-spacing="0.5">Two-Way Bindings</text>
    <text x="280" y="0" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#475569">•</text>
    <text x="370" y="0" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#64748b" letter-spacing="0.5">Zero JSX</text>
  </g>
</svg>
